<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gracias | Valmoré</title>
  <style>
    :root {
      --verde: #1a2e1e;
      --dorado: #c9a84c;
      --crema: #f5f0e8;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--verde);
      color: var(--crema);
      font-family: Georgia, serif;
      text-align: center;
      padding: 32px;
    }
    .wrap {
      max-width: 640px;
    }
    h1 {
      font-size: clamp(36px, 5vw, 58px);
      margin: 0 0 16px;
      letter-spacing: 1px;
    }
    p {
      font-size: 20px;
      line-height: 1.6;
      margin: 0 0 28px;
      opacity: 0.9;
    }
    a {
      display: inline-block;
      padding: 14px 28px;
      border: 1px solid var(--dorado);
      color: var(--verde);
      background: var(--dorado);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Gracias por tu consulta</h1>
    <p>Recibimos tu mensaje y vamos a responderte a la brevedad.</p>
    <a href="/">Volver a Valmoré</a>
  </div>
</body>
</html>
